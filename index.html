<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dušeni vzbujeni harmonični oscilator (FMF Proseminar)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<h2>Dušeni vzbujeni harmonični oscilator</h2>

<div id="container">
  <!-- Row 1 -->
<div class="panel">
  <div class="plot-title">Harmonična potencialna energija</div>
  <canvas id="simCanvas" width="420" height="250"></canvas>
</div>

<div class="panel">
  <div class="plot-title">Časovna odvisnost položaja</div>
  <canvas id="xtCanvas" width="420" height="250"></canvas>
</div>

<div class="panel">
  <div class="plot-title">Hitrost v odvisnosti od položaja (fazni prostor)</div>
  <canvas id="phaseCanvas" width="420" height="250"></canvas>
</div>

<div class="panel">
  <div class="plot-title">Amplituda (za vzbujeno gibanje)</div>
  <canvas id="resCanvas" width="420" height="250"></canvas>
</div>

<div class="panel">
  <div class="plot-title">Fazni zamik (za vzbujeno gibanje)</div>
  <canvas id="phasePlotCanvas" width="420" height="250"></canvas>
</div>

  <!-- (2,3): sliders -->
  <div id="sliders">
    <div class="slider-row">
      <label for="m">m</label>
      <span class="min-span">0 kg</span>
      <input type="range" id="m" min="0.5" max="5" step="0.1" value="1">
      <span id="mVal"></span>
    </div>

    <div class="slider-row">
      <label for="k">k</label>
      <span class="min-span">0 N/m</span>
      <input type="range" id="k" min="0.5" max="10" step="0.1" value="1">
      <span id="kVal"></span>
    </div>

    <div class="slider-row">
      <label for="b">b</label>
      <span class="min-span">0 kg/s</span>
      <input type="range" id="b" min="0" max="5" step="0.01" value="0">
      <span id="bVal"></span>
    </div>
    
    <hr>

    <div class="slider-row">
      <label for="F">F</label>
      <span class="min-span">0 N</span>
      <input type="range" id="F" min="0" max="5" step="0.01" value="0">
      <span id="FVal"></span>
    </div>

    <div class="slider-row">
      <label for="w">ω</label>
      <span class="min-span">0 rad/s</span>
      <input type="range" id="w" min="0" max="5" step="0.01" value="1">
      <span id="wVal"></span>
    </div>

    <div class="slider-row">
      <label for="omega0Slider">ω₀</label>
      <span class="min-span">0 rad/s</span>
      <input type="range" id="omega0Slider" min="0.5" max="5" step="0.01" value="1">
      <span id="omega0Val"></span>
    </div>

    
  </div>
</div>

<!-- Presets at the bottom -->
<div id="presets">

  <div class="preset-row">
    <span class="preset-label">Dušenje:</span>
    <button id="dampNone" class="preset-btn">Brez dušenja</button>
    <button id="dampUnder" class="preset-btn">Pod-kritično</button>
    <button id="dampCrit" class="preset-btn">Kritično</button>
    <button id="dampOver" class="preset-btn">Nad-kritično</button>
    <button id="dampCustom" class="preset-btn">Ročna nastavitev</button>
  </div>

  <div class="preset-row">
    <span class="preset-label">Vzbujanje:</span>
    <button id="driveNone" class="preset-btn">Brez vzbujanja</button>
    <button id="driveOff" class="preset-btn">Izven resonance</button>
    <button id="driveRes" class="preset-btn">Resonanca</button>
    <button id="driveCustom" class="preset-btn">Ročna nastavitev</button>
  </div>

  <!-- Reset on its own line -->
  <div class="preset-row">
    <button id="startStopBtn" class="preset-btn">Ustavi</button>
    <button id="resetBtn" class="preset-btn reset-btn">Ponastavi</button>
  </div>

</div>

<div class="qt-footer">
  <a href="https://quantum-theory.fmf.uni-lj.si/" target="_blank">
     quantum-theory.fmf.uni-lj.si
  </a>
</div>

<script src="oscillator.js"></script>
</body>
</html>
